<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>掲示板</title>
</head>
<body>

<h1>テニスの掲示板</h1>

<input id="name" placeholder="名前">
<input id="text" placeholder="書き込み">
<button onclick="post()">投稿</button>

<ul id="list"></ul>

<script>
// ページ読み込み時に保存データを表示
window.onload = function() {
  const saved = JSON.parse(localStorage.getItem("bbs")) || [];
  const list = document.getElementById("list");

  saved.forEach(item => {
    const li = document.createElement("li");
    li.innerHTML = `<strong>${item.name}</strong>：${item.text} <br><small>${item.time}</small>`;
    list.appendChild(li);
  });
};

function post() {
  const name = document.getElementById("name").value || "名無し";
  const text = document.getElementById("text").value;
  if (text === "") return;

  // 日付を作る
  const now = new Date();
  const time = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;

  const li = document.createElement("li");
  li.innerHTML = `<strong>${name}</strong>：${text} <br><small>${time}</small>`;
  document.getElementById("list").appendChild(li);
