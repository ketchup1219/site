<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>掲示板</title>
</head>
<body>

<h1>テニスの掲示板</h1>

<!-- 名前入力欄 -->
<input id="name" placeholder="名前を入力">

<!-- コメント入力欄 -->
<input id="text" placeholder="書き込み">

<button onclick="post()">投稿</button>

<ul id="list"></ul>

<script>
function post() {
  const name = document.getElementById("name").value;
  const text = document.getElementById("text").value;

  if (text === "") return;

  const li = document.createElement("li");

  // 名前が空なら「名無し」にする
  const displayName = name === "" ? "名無し" : name;

  li.innerHTML = `<strong>${displayName}</strong>：${text}`;

  document.getElementById("list").appendChild(li);

  // 入力欄を空にする
  document.getElementById("text").value = "";
}
</script>

</body>
</html>
