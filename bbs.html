<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>掲示板</title>
</head>
<body>

<h1>斗天の掲示板</h1>

<input id="text" placeholder="書き込み">
<button onclick="post()">投稿</button>

<ul id="list"></ul>

<script>
function post() {
  const text = document.getElementById("text").value;
  if (text === "") return;

  const li = document.createElement("li");
  li.textContent = text;

  document.getElementById("list").appendChild(li);
  document.getElementById("text").value = "";
}
</script>

</body>
</html>
