<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>掲示板</title>
</head>
<body>

<h1>テニスの掲示板</h1>

<input id="name" placeholder="名前">
<input id="text" placeholder="書き込み">
<button onclick="post()">投稿</button>

<ul id="list"></ul>

<script>
// ページ読み込み時に保存データを表示
window.onload = function() {
  const saved = JSON.parse(localStorage.getItem("bbs")) || [];
  const list = document.getElementById("list");

  saved.forEach(item => {
    const li = document.createElement("li");
    li.innerHTML = `<strong>${item.name}</strong>：${item.text}`;
    list.appendChild(li);
  });
};

function post() {
  const name = document.getElementById("name").value || "名無し";
  const text = document.getElementById("text").value;
  if (text === "") return;

  const li = document.createElement("li");
  li.innerHTML = `<strong>${name}</strong>：${text}`;
  document.getElementById("list").appendChild(li);

  // 保存処理
  const saved = JSON.parse(localStorage.getItem("bbs")) || [];
  saved.push({ name: name, text: text });
  localStorage.setItem("bbs", JSON.stringify(saved));

  document.getElementById("text").value = "";
}
</script>

</body>
</html>
